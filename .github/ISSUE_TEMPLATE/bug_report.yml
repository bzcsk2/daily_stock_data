name: 缺陷报告 / Bug report
description: 报告采集脚本或存储后端中可复现的问题。
title: "[缺陷]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题概要 / Summary
      description: 发生了什么问题？
    validations:
      required: true
  - type: dropdown
    id: storage
    attributes:
      label: 存储后端 / Storage backend
      options:
        - csv
        - postgres
        - both
        - not sure
    validations:
      required: true
  - type: input
    id: script
    attributes:
      label: 脚本或包装器 / Script or wrapper
      placeholder: get_new_daily.py / run_daily_sync_batches.sh
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: 执行命令 / Command
      description: 粘贴你运行的命令。请移除 token 和密码。
      render: bash
  - type: textarea
    id: logs
    attributes:
      label: 相关日志 / Relevant logs
      description: 粘贴最小必要日志片段。请移除 token、密码和私有主机名。
      render: text
  - type: textarea
    id: environment
    attributes:
      label: 环境 / Environment
      description: 操作系统、Python 版本、依赖版本，以及是 cron 运行还是手工运行。
