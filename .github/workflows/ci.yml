name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Ruff correctness check
        run: python -m ruff check . --select E9,F63,F7,F82

      - name: Ruff shared module check
        run: >-
          python -m ruff check
          scripts/storage_common.py
          scripts/tdx_common.py
          scripts/kline_common.py
          scripts/snapshot_unified_common.py
          scripts/tdx_f10_common.py

      - name: Ruff K-line collector check
        run: >-
          python -m ruff check
          scripts/get_new_daily.py
          scripts/get_new_5min.py

      - name: Ruff metadata collector check
        run: >-
          python -m ruff check
          scripts/sync_tushare_stock_basic.py
          scripts/sync_tickflow_instruments.py

      - name: Ruff snapshot collector check
        run: python -m ruff check scripts/download_quotes_tencent.py

      - name: Ruff TDX xdxr collector check
        run: python -m ruff check scripts/sync_tdx_xdxr.py

      - name: Ruff TDX finance collector check
        run: python -m ruff check scripts/sync_tdx_finance.py

      - name: Ruff TDX blocks collector check
        run: python -m ruff check scripts/sync_tdx_blocks.py

      - name: Ruff TDX tick and F10 export check
        run: >-
          python -m ruff check
          scripts/sync_tdx_tick_trades.py
          scripts/export_tdx_f10_txts.py

      - name: Compile Python sources
        run: python -m py_compile scripts/*.py

      - name: Run tests
        run: python -m pytest

      - name: Check shell wrapper syntax
        run: |
          for script in bin/run_*.sh; do
            bash -n "$script"
          done

      - name: Check for private path leaks
        run: |
          ! grep -RInE '(/vol4|159951159|/home/|\.config/k-download|/miniconda|/Workflow/k-download)' \
            --exclude-dir=.git \
            --exclude=ci.yml \
            .
